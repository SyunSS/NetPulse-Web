services:
  netpulse:
    image: ghcr.io/syunss/netpulse-web:latest
    container_name: netpulse
    ports:
      - "3000:3000"
    volumes:
      - netpulse-data:/app/data
      - netpulse-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  netpulse-data:
  netpulse-logs:

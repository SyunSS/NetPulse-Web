# NetPulse Web - Docker Desktop (Windows/Mac/Linux)
#
# 使用方式:
#   1. docker compose up -d
#   2. 浏览器打开 http://localhost:3000
#   3. docker compose logs -f  查看日志
#   4. docker compose down     停止服务

services:
  netpulse:
    image: ghcr.io/syunss/netpulse-web:latest
    container_name: netpulse
    ports:
      - "3000:3000"
    volumes:
      - netpulse-data:/app/data
      - netpulse-logs:/app/logs
    networks:
      - netpulse-net
    restart: unless-stopped
    environment:
      - RUST_LOG=info,netpulse_web=debug
      - CHROME_PATH=/usr/bin/chromium
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  netpulse-data:
    driver: local
  netpulse-logs:
    driver: local

networks:
  netpulse-net:
    driver: bridge

services:
  # 后端 API 服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netpulse-backend
    ports:
      - "3000:3000"
    volumes:
      # 数据持久化：SQLite 数据库、日志、截图、Excel
      - netpulse-data:/app/data
      - netpulse-logs:/app/logs
      # 配置文件可外部覆盖
      - ./backend/config.toml:/app/config.toml:ro
    environment:
      - RUST_LOG=info,netpulse_web=debug
      - NETPULSE__SERVER__HOST=0.0.0.0
      - NETPULSE__SERVER__PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 前端 Nginx 服务
  frontend:
    image: nginx:alpine
    container_name: netpulse-frontend
    ports:
      - "5173:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  netpulse-data:
  netpulse-logs:
